<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- ================= HEADER / CABEÇALHO ================= -->
    <header>

        <!-- Logo do site -->
        <img src="./img/LOGO.png" alt="Logo Macarrão" class="logo">

    </header>

    <!-- ================= NAVBAR / NAVEGAÇÃO ================= -->
    <nav class="navbar navbar-expand-lg navbar-custom fixed-top">

        <div class="container-fluid px-4">

            <!-- BOTÃO MOBILE -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <!-- MENU -->
            <div class="collapse navbar-collapse flex-column" id="menu">

                <!-- TOPO -->
                <div class="topo-navbar d-flex justify-content-center align-items-center w-100 mb-3 position-relative">

                    <!-- PESQUISA -->
                    <form class="d-flex pesquisa-box" style="max-width: 400px;">

                        <input class="form-control pesquisa-input" type="search" placeholder="Pesquisar">

                    </form>

                    <!-- ÍCONES -->
                    <div class="d-flex align-items-center gap-4 position-absolute end-0 me-3">

                        <!-- FAVORITOS -->
                        <a href="#" class="icone-topo">

                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor"
                                class="bi bi-heart" viewBox="0 0 16 16">

                                <path
                                    d="m8 2.748-.717-.737C5.6.281 2.514.878 1.4 3.053c-.523 1.023-.641 2.5.314 4.385.92 1.815 2.834 3.989 6.286 6.357 3.452-2.368 5.365-4.542 6.286-6.357.955-1.886.838-3.362.314-4.385C13.486.878 10.4.28 8.717 2.01z" />

                            </svg>

                        </a>

                        <!-- PERFIL -->
                        <a href="Cadastro.html" class="icone-topo">

                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor"
                                class="bi bi-person" viewBox="0 0 16 16">

                                <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6" />

                                <path fill-rule="evenodd"
                                    d="M8 9a5 5 0 0 0-5 5 .5.5 0 0 0 .5.5h9a.5.5 0 0 0 .5-.5A5 5 0 0 0 8 9" />

                            </svg>

                        </a>

                        <!-- CARRINHO -->
                        <a href="#" class="icone-topo" aria-label="Carrinho de compras">

                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor"
                                viewBox="0 0 24 24">

                                <path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" />
                                <path d="M7.16 14.26l.94-2.34 8.07.67.7-3.32H6.01L5.27 4H2v2h2l3.6 7.59-1.35 2.44c-.16.28-.25.61-.25.97 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12z" />

                            </svg>

                        </a>

                    </div>

                </div>

                <!-- LINKS -->
                <ul class="navbar-nav menu-links gap-4">

                    <li class="nav-item">
                        <a class="nav-link" href="#">Novidades</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Feminino</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Vestidos</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Conjuntos</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Promoções</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Acessórios</a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- ================= CARROSSEL / CAROUSEL ================= -->
    <div id="carouselExampleIndicators" class="carousel slide">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0"
                class="active" aria-current="true" aria-label="Slide 1"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"
                aria-label="Slide 2"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"
                aria-label="Slide 3"></button>
        </div>
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="./img/duopreto.png" class="d-block w-100" alt="...">
            </div>
            <div class="carousel-item">
                <img src="./img/triobranco.png" class="d-block w-100" alt="...">
            </div>
            <div class="carousel-item">
                <img src="./img/triovermelho.png" class="d-block w-100" alt="...">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators"
            data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators"
            data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>

    <!-- =======================================================
         BANNER PROMOCIONAL
    ======================================================= -->
    <section class="banner-promocional">

        <div class="container text-center">

            <h2 >PROMOÇÃO ESPECIAL</h2>

            <p>Até 40% OFF em peças selecionadas</p>

            <a href="promo.html" class="btn botao-promocao">

                Comprar Agora

            </a>

        </div>

    </section>

    <!-- PRODUTOS -->
    <section class="container py-5">
        <h2 class="text-center titulo mb-5">Destaques</h2>
        <div class="row g-4 justify-content-center">
            <!-- CARD 1 -->
            <div class="col-lg-4 col-md-6">
                <div class="card produto-card h-100">
                    <img src="./img/Conjunto Alfaiataria-Branco.webp" class="card-img-top" alt="Conjunto Branco">
                    <div class="card-body text-center">
                        <h5 class="card-title">Conjunto Elegance</h5>
                        <p class="card-text">R$ 150,90</p>
                        <button class="btn botao-principal">Comprar</button>
                    </div>
                </div>
            </div>
            <!-- CARD 2 -->
            <div class="col-lg-4 col-md-6">
                <div class="card produto-card h-100">
                    <img src="./img/conjunto-feminino-marrom.webp" class="card-img-top" alt="Conjunto Marrom">
                    <div class="card-body text-center">
                        <h5 class="card-title">Conjunto Marrom</h5>
                        <p class="card-text">R$ 100,90</p>
                        <button class="btn botao-principal">Comprar</button>
                    </div>
                </div>
            </div>
            <!-- CARD 3 -->
            <div class="col-lg-4 col-md-6">
                <div class="card produto-card h-100">
                    <img src="./img/O-vestido vinho.webp" class="card-img-top" alt="Conjunto Vinho">
                    <div class="card-body text-center">
                        <h5 class="card-title">Vinho Modern</h5>
                        <p class="card-text">R$ 200,90</p>
                        <button class="btn botao-principal">Comprar</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <a href="Contato.html" class="whatsapp-contato">
        <img src="./img/what.png" alt="WhatsApp" />
        <span>contato</span>
    </a>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>




        

</body>

</html>
