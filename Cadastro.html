<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastro - Loja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <img src="./img/LOGO.png" alt="Logo" class="logo">
    </header>

    <main class="cadastro container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h2 class="text-center mb-3" style="color: #0a2a45;">Crie sua conta</h2>

                        <form>
                            <div class="mb-3">
                                <label class="form-label">Nome completo</label>
                                <input type="text" class="form-control" placeholder="Seu nome">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">E-mail</label>
                                <input type="email" class="form-control" placeholder="seu@email.com">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Senha</label>
                                <input type="password" class="form-control" placeholder="Senha">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Confirmar senha</label>
                                <input type="password" class="form-control" placeholder="Confirmar senha">
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-promocao">Cadastrar</button>
                            </div>
                        </form>

                        <p class="text-center mt-3"><a href="index.html">Voltar à página inicial</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
