<!doctype html>
<html lang="pt-br">
    <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contato - Loja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    </head>
    <body>

    <header>
      <img src="./img/LOGO.png" alt="Logo" class="logo">
    </header>


  <!-- =======================================================
     ÁREA DE CONTATO
  ======================================================= -->

  <section class="contato py-5">

    <div class="container">

      <div class="contato-box">

        <!-- TÍTULO -->
        <div class="text-center mb-5">

          <h2 class="titulo-contato">
            Entre em Contato
          </h2>

          <p class="subtitulo-contato">
            Tire suas dúvidas ou fale com nossa equipe
          </p>

        </div>

        <!-- FORMULÁRIO -->
        <form>

          <!-- NOME -->
          <div class="mb-4">

            <label class="form-label">
              Nome
            </label>

            <input 
            type="text"
            class="form-control input-contato"
            placeholder="Digite seu nome">

          </div>

          <!-- EMAIL -->
          <div class="mb-4">

            <label class="form-label">
              E-mail
            </label>

            <input 
            type="email"
            class="form-control input-contato"
            placeholder="Digite seu e-mail">

          </div>

          <!-- MENSAGEM -->
          <div class="mb-4">

            <label class="form-label">
              Mensagem
            </label>

            <textarea 
            class="form-control textarea-contato"
            rows="5"
            placeholder="Digite sua mensagem">
            </textarea>

          </div>

          <!-- BOTÃO -->
          <div class="text-center">

            <button type="submit" class="btn botao-contato">

              Enviar Mensagem

            </button>

          </div>

        </form>

      </div>

    </div>

  </section>

    <a href="#" class="whatsapp-contato">
      <img src="./img/what.png" alt="WhatsApp" />
      <span>contato</span>
    </a>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
  </html>
